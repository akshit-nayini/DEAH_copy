name: Synthetic Data Generator — Mapped Python

on:
  workflow_dispatch:
    inputs:
      mapping_file:
        description: 'Mapping CSV filename (from core/design/agents/data_model/output/)'
        required: true
        default: 'model_SCRUM-5_20260413_23_mapping.csv'

jobs:
  generate-synthetic-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r core/testing/agents/synthetic_data/synthetic_data_generator_mapped_python/requirements.txt

      # ── 4. Write mapping filename into trigger_config.yaml ────────────────
      - name: Set mapping file
        run: |
          cat > core/testing/agents/synthetic_data/synthetic_data_generator_mapped_python/trigger_config.yaml << 'EOF'
          mapping_files:
            - "${{ github.event.inputs.mapping_file }}"
          EOF

      # ── 5. Run the generator ──────────────────────────────────────────────
      - name: Run Synthetic Data Generator
        run: |
          cd core/testing/agents/synthetic_data/synthetic_data_generator_mapped_python
          python trigger.py

      # ── 6. Commit output SQL back to main ─────────────────────────────────
      - name: Commit output SQL to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add core/testing/agents/synthetic_data/synthetic_data_generator_mapped_python/output/

          if git diff --cached --quiet; then
            echo "Nothing to commit — SQL may already be up to date."
            ls -la core/testing/agents/synthetic_data/synthetic_data_generator_mapped_python/output/
          else
            git commit -m "chore: auto-generate synthetic SQL [skip ci]

          Generated by  : Synthetic Data Generator (Pure Python)
          Trigger       : workflow_dispatch (manual)
          Mapping file  : ${{ github.event.inputs.mapping_file }}"

            git push origin main
            echo "SQL committed to main successfully."
          fi