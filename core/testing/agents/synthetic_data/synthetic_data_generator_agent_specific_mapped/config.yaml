# =============================================================
# config.yaml — OUR TEAM owns this file
# Core settings for the Synthetic Data Generator Agent
# Never modified by upstream team or their UI
# =============================================================

# BigQuery target settings
bq_project: "your-gcp-project"
bq_dataset: "your_dataset"

# Generation settings
num_records: 50
date_window_days: 15        # to_date = today, from_date = today - N days

# Claude model settings
model: "claude-sonnet-4-6"  # claude-sonnet-4-6 | claude-opus-4-6 | claude-haiku-4-5-20251001
batch_size: 50              # rows generated per Claude API call
analysis_sample: 50         # max mapping rows sent to Claude for analysis

# Input — design team's output folder (where mapping CSVs live)
mapping_source_dir: "core/design/agents/data_model/output"

# Output — where generated SQL files are written
output_dir: "core/testing/agents/synthetic_data/synthetic_data_generator_agent_specific_mapped/output"
