<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DE Assistant — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: #252526;
            border: 1px solid #444;
            padding: 40px;
            width: 320px;
        }
        h1 { font-size: 16px; color: #fff; margin-bottom: 24px; }
        label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
        input[type="password"] {
            width: 100%;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            background: #0e639c;
            color: #fff;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover { background: #1177bb; }
        .error {
            color: #f48771;
            font-size: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>DE Assistant</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autofocus placeholder="Enter password">
            <button type="submit">Login →</button>
        </form>
    </div>
</body>
</html>
