server:
  port: 8080

spring:
  application:
    name: prodapt-requirements-backend
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Requirements Agent (FastAPI) configuration
requirements-agent:
  base-url: ${REQUIREMENTS_AGENT_URL:http://localhost:8001}
  timeout-seconds: ${REQUIREMENTS_AGENT_TIMEOUT:300}
  # Optional API key for the FastAPI agent (leave blank if not needed)
  api-key: ${REQUIREMENTS_AGENT_API_KEY:}

# GitHub source configuration
github:
  api-base-url: https://api.github.com
  raw-base-url: https://raw.githubusercontent.com
  timeout-seconds: ${GITHUB_TIMEOUT:30}

# Google Drive source configuration
google-drive:
  api-base-url: https://www.googleapis.com/drive/v3
  timeout-seconds: ${GDRIVE_TIMEOUT:30}

# CORS - adjust origins for production
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://35.209.107.68:6005}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.prodapt.requirements: DEBUG
    org.springframework.web: INFO
